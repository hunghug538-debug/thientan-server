<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Đơn Hàng | Thiên Tân Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f0;
            margin: 0;
            padding: 20px;
        }

        .header {
            background: #004d20;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            margin-top: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #004d20;
            color: white;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .badge {
            background: #e6f4ea;
            color: #004d20;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85em;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>📋 Hệ Thống Đơn Hàng Thiên Tân</h2>
        <span id="autoRefreshText">Tự động làm mới 30s...</span>
    </div>

    <div class="container">
        <h3>Danh sách đơn đặt lịch chụp (Mới nhất)</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên Khách</th>
                    <th>SĐT</th>
                    <th>Gói Chụp</th>
                    <th>Giá</th>
                    <th>Lựa Chọn / Ghi Chú</th>
                    <th>Thời Gian</th>
                    <th>Trạng Thái</th>
                </tr>
            </thead>
            <tbody id="orderTable">
                <tr>
                    <td colspan="8" style="text-align:center;">Đang tải dữ liệu...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="loginOverlay"
        style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:9999;">
        <div style="background:#fff; padding:30px; border-radius:10px; width:300px; text-align:center;">
            <h3>Đăng nhập Admin</h3>
            <input type="text" id="username" placeholder="Tên đăng nhập"
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
            <input type="password" id="password" placeholder="Mật khẩu"
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
            <button onclick="login()"
                style="width:100%; padding:10px; background:#004d20; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">ĐĂNG
                NHẬP</button>
            <p id="loginError" style="color:red; font-size:14px; display:none; margin-top:10px;">Sai thông tin!</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://thientan-server-production.up.railway.app';
        let refreshInterval;

        function checkAuth() {
            const token = localStorage.getItem('tt_admin_token');
            if (token) {
                document.getElementById('loginOverlay').style.display = 'none';
                loadOrders();
                refreshInterval = setInterval(loadOrders, 30000);
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                if (refreshInterval) clearInterval(refreshInterval);
            }
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('loginError');

            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('tt_admin_token', data.token);
                    err.style.display = 'none';
                    checkAuth();
                } else {
                    err.innerText = data.message || 'Sai thông tin!';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.innerText = 'Lỗi kết nối máy chủ';
                err.style.display = 'block';
            }
        }

        async function loadOrders() {
            try {
                const token = localStorage.getItem('tt_admin_token');
                const res = await fetch(`${API_URL}/api/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401 || res.status === 403) {
                    // Token expired or invalid
                    localStorage.removeItem('tt_admin_token');
                    checkAuth();
                    return;
                }

                const orders = await res.json();
                const tbody = document.getElementById('orderTable');

                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Chưa có đơn hàng nào</td></tr>';
                    return;
                }

                tbody.innerHTML = orders.map(o => `
          <tr>
            <td>#${o.id}</td>
            <td><strong>${o.ten_khach}</strong></td>
            <td><a href="tel:${o.so_dien_thoai}" style="color:#004d20; font-weight:bold;">${o.so_dien_thoai}</a></td>
            <td>${o.goi_chup}</td>
            <td>${Number(o.gia).toLocaleString('vi-VN')} VNĐ</td>
            <td style="font-size: 0.9em; color:#555;">
              <strong>Chọn:</strong> ${o.lua_chon || 'Không'}<br>
              <strong>Ghi chú:</strong> ${o.ghi_chu || 'Không'}
            </td>
            <td style="font-size: 0.85em; color:#888;">${new Date(o.created_at).toLocaleString('vi-VN')}</td>
            <td><span class="badge">${o.trang_thai}</span></td>
          </tr>
        `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('orderTable').innerHTML = '<tr><td colspan="8" style="text-align:center; color:red;">Lỗi tải dữ liệu</td></tr>';
            }
        }

        checkAuth();
    </script>
</body>

</html>
